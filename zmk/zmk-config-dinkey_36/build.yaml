# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "dinkey_36_left", "dinkey_36_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
#to enable nice!view use the left/right shields below 
# shield: dinkey_36_left nice_view_adapter nice_view
# shield: dinkey_36_right nice_view_adapter nice_view
---
include:
  - board: nice_nano_v2
    shield: dinkey_36_left nice_view_adapter nice_view
  - board: nice_nano_v2
    shield: dinkey_36_right nice_view_adapter nice_view



#uncomment to generate board reset file  
 #- board: nice_nano_v2
